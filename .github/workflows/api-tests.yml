name: API Tests

on:
  push:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: |
          newman run Collections/ServeRest.postman_collection.json \
            -e Environments/ServeRest.postman_environment.json